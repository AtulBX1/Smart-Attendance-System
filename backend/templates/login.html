<!DOCTYPE html>
<html>

<head>
    <title>Login - Smart Attendance System</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            display: flex;
            justify-content: center;
            background-color: #f9f9f9;
        }

        .login-box {
            background: white;
            border: 1px solid #ccc;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            box-sizing: border-box;
            border-radius: 4px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .error {
            color: #d9534f;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>System Login</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form action="{{ url_for('login') }}" method="POST">
            <label>Username (Admin/Faculty/Mentor ID)</label>
            <input type="text" name="username" required placeholder="e.g. admin, faculty, M001">

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>
        <div
            style="margin-top: 20px; padding: 10px; background: #eee; border-radius: 4px; font-size: 12px; color: #555;">
            <strong>Mock Credentials:</strong><br>
            Admin: admin / admin123<br>
            Faculty: faculty / faculty123<br>
            Mentor: M001 / mentor123
        </div>
    </div>

</body>

</html>
